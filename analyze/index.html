<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analysis Reports Index</title>
<style>
  :root {
    --bg: #f7f7f8;
    --card: #ffffff;
    --border: #e3e3e6;
    --text: #1a1a1a;
    --muted: #6b6b70;
    --accent: #2563eb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }
  h1 { font-size: 1.9rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 36px; font-size: 0.95rem; }
  .group { margin-bottom: 32px; }
  .group h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight: 600;
  }
  ul { list-style: none; margin: 0; padding: 0; }
  li { margin: 0 0 10px; }
  a.card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .12s ease, transform .12s ease, box-shadow .12s ease;
  }
  a.card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
  }
  .icon { font-size: 1.3rem; opacity: .8; }
  .meta { display: flex; flex-direction: column; }
  .name { font-weight: 600; }
  .path { color: var(--muted); font-size: 0.82rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  footer { color: var(--muted); font-size: 0.8rem; margin-top: 40px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Analysis Reports</h1>
  <p class="sub">Browse the HTML reports generated in this directory.</p>

  <div class="group">
    <h2>neuro</h2>
    <ul>
      <li><a class="card" href="neuro/report.html">
        <span class="icon">&#128202;</span>
        <span class="meta"><span class="name">Report</span><span class="path">neuro/report.html</span></span>
      </a></li>
      <li><a class="card" href="neuro/report_generalization.html">
        <span class="icon">&#128202;</span>
        <span class="meta"><span class="name">Generalization Report</span><span class="path">neuro/report_generalization.html</span></span>
      </a></li>
    </ul>
  </div>

  <div class="group">
    <h2>toy_examples</h2>
    <ul>
      <li><a class="card" href="toy_examples/report.html">
        <span class="icon">&#128202;</span>
        <span class="meta"><span class="name">Report</span><span class="path">toy_examples/report.html</span></span>
      </a></li>
    </ul>
  </div>

  <footer>Static index &mdash; add new reports by editing <code>index.html</code>.</footer>
</div>
</body>
</html>
